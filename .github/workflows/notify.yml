name: Strava Ride Call Notifications

on:
  schedule:
    # Daily, at both candidate "noon PT" hours. The script's noon-hour guard
    # ensures exactly one run proceeds year-round (DST-safe).
    - cron: '0 19 * * *'   # noon PDT (summer)
    - cron: '0 20 * * *'   # noon PST (winter)
  workflow_dispatch:        # Manual test runs (redirect to the test DM)
    inputs:
      test_event_id:
        description: 'Preview a specific event ID (bypasses the tomorrow filter)'
        required: false
      force_rain:
        description: 'Force the rain warning on (preview)'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Run notifier
        env:
          STRAVA_CLUB_ID: ${{ vars.STRAVA_CLUB_ID }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          # Lets the job write a rotated refresh token back to the secret store.
          GH_SECRETS_PAT: ${{ secrets.GH_SECRETS_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_FTWNB: ${{ secrets.SLACK_WEBHOOK_URL_FTWNB }}
          # Manual runs redirect to the test DM (never the real channels);
          # scheduled runs post for real. Both lines below are gated on the
          # event being a manual dispatch.
          SLACK_WEBHOOK_URL_TEST: ${{ github.event_name == 'workflow_dispatch' && secrets.SLACK_WEBHOOK_URL_TEST || '' }}
          SKIP_NOON_GUARD: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
          TEST_EVENT_ID: ${{ inputs.test_event_id }}
          TEST_FORCE_RAIN: ${{ inputs.force_rain && '1' || '' }}
        run: npm start
