name: Strava Ride Call Notifications

on:
  schedule:
    # Once daily, ~noon PT. Single off-peak cron (off-the-hour schedules are
    # dispatched more promptly, and one line means no double-post risk).
    # UTC is fixed, so this lands at 12:30 PDT (summer) / 11:30 AM PST (winter).
    - cron: '30 19 * * *'
  workflow_dispatch:        # Manual runs (redirect to the test DM by default)
    inputs:
      test_event_id:
        description: 'Preview a specific event ID (bypasses the tomorrow filter)'
        required: false
      force_rain:
        description: 'Force the rain warning on (preview)'
        type: boolean
        default: false
      post_for_real:
        description: 'Post to the real channels instead of the test DM'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Run notifier
        env:
          STRAVA_CLUB_ID: ${{ vars.STRAVA_CLUB_ID }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          # Lets the job write a rotated refresh token back to the secret store.
          GH_SECRETS_PAT: ${{ secrets.GH_SECRETS_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_FTWNB: ${{ secrets.SLACK_WEBHOOK_URL_FTWNB }}
          # Manual runs redirect to the test DM unless post_for_real is set;
          # scheduled runs always post for real.
          SLACK_WEBHOOK_URL_TEST: ${{ (github.event_name == 'workflow_dispatch' && !inputs.post_for_real) && secrets.SLACK_WEBHOOK_URL_TEST || '' }}
          TEST_EVENT_ID: ${{ inputs.test_event_id }}
          TEST_FORCE_RAIN: ${{ inputs.force_rain && '1' || '' }}
        run: npm start
